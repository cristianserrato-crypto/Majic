# Copiar a /etc/nginx/sites-available/ y enlazar en sites-enabled.
# Cambia server_name y root cuando tengas dominio y ruta final.

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;

    root /var/www/fincsdash/majic-3d-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
